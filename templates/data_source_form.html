{% extends 'base.html' %}
{% block title %}New Data Source — InsightForge BI{% endblock %}
{% block content %}
<div class="page-header">
  <h1>New Data Source</h1>
  <a href="{{ url_for('data_sources') }}" class="btn btn-secondary">&#8592; Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('new_data_source') }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label for="name">Name *</label>
      <input type="text" id="name" name="name" class="form-control"
             placeholder="e.g. Production Sales DB" required maxlength="120" />
    </div>
    <div class="form-group">
      <label for="data_type">Type *</label>
      <select id="data_type" name="data_type" class="form-control" required>
        <option value="">Select type...</option>
        <option value="csv">CSV File</option>
        <option value="database">Database</option>
        <option value="api">REST API</option>
        <option value="excel">Excel</option>
      </select>
    </div>
    <div class="form-group">
      <label for="connection_string">Connection String</label>
      <input type="text" id="connection_string" name="connection_string" class="form-control"
             placeholder="e.g. postgresql://user:pass@host/db" autocomplete="off" maxlength="2000" />
      <small class="text-muted">Leave blank for file-based sources.</small>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Add Data Source</button>
      <a href="{{ url_for('data_sources') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
