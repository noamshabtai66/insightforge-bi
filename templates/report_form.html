{% extends 'base.html' %}
{% block title %}New Report — InsightForge BI{% endblock %}
{% block content %}
<div class="page-header">
  <h1>New Report</h1>
  <a href="{{ url_for('reports') }}" class="btn btn-secondary">&#8592; Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('new_report') }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label for="name">Report Name *</label>
      <input type="text" id="name" name="name" class="form-control"
             placeholder="e.g. Q1 Sales Summary" required maxlength="120" />
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" class="form-control" rows="3"
                placeholder="Optional description" maxlength="1000"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Report</button>
      <a href="{{ url_for('reports') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
