{% extends 'base.html' %}
{% block title %}Register — InsightForge BI{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">&#9670; InsightForge</div>
    <h2>Create Account</h2>
    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Choose a username" required autofocus minlength="3" maxlength="80" />
      </div>
      <div class="form-group">
        <label for="email">Email <span class="text-muted">(optional)</span></label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" maxlength="120" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="At least 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control"
               placeholder="Repeat password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
  </div>
</div>
{% endblock %}
