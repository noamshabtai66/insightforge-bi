{% extends 'base.html' %}
{% block title %}Login — InsightForge BI{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">&#9670; InsightForge</div>
    <h2>Sign In</h2>
    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
      {% if next %}<input type="hidden" name="next" value="{{ next }}" />{% endif %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Enter username" required autofocus autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
